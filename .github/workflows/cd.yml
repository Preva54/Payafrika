name: CD

on:
  push:
    branches: [main, master]
  workflow_dispatch:
    inputs:
      environment:
        description: "Deployment target"
        required: true
        default: staging
        type: choice
        options:
          - staging
          - production

env:
  REGISTRY: ghcr.io
  IMAGE_NAME_FRONTEND: ${{ github.repository }}/frontend
  IMAGE_NAME_BACKEND: ${{ github.repository }}/backend
  NODE_VERSION: "22"
  DOTNET_VERSION: "10.0.x"

jobs:
  docker:
    name: Build & Push Docker Images
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Determine tags
        id: tags
        shell: bash
        run: |
          FRONTEND_BASE="ghcr.io/preva54/payafrika-frontend"
          BACKEND_BASE="ghcr.io/preva54/payafrika-backend"
          SHA_TAG="${GITHUB_SHA::7}"
          BRANCH_TAG="${GITHUB_REF_NAME}"
          FRONTEND_TAGS="$FRONTEND_BASE:$SHA_TAG,$FRONTEND_BASE:$BRANCH_TAG"
          BACKEND_TAGS="$BACKEND_BASE:$SHA_TAG,$BACKEND_BASE:$BRANCH_TAG"
          if [[ "$GITHUB_REF_NAME" == "main" || "$GITHUB_REF_NAME" == "master" ]]; then
            FRONTEND_TAGS="$FRONTEND_TAGS,$FRONTEND_BASE:latest"
            BACKEND_TAGS="$BACKEND_TAGS,$BACKEND_BASE:latest"
          fi
          echo "frontend_tags=$FRONTEND_TAGS" >> $GITHUB_OUTPUT
          echo "backend_tags=$BACKEND_TAGS" >> $GITHUB_OUTPUT

      - name: Build & push frontend
        uses: docker/build-push-action@v6
        with:
          context: frontend
          push: true
          tags: ${{ steps.tags.outputs.frontend_tags }}
          no-cache: true

      - name: Build & push backend
        uses: docker/build-push-action@v6
        with:
          context: backend/PayAfrika.API
          push: true
          tags: ${{ steps.tags.outputs.backend_tags }}
          no-cache: true

  deploy:
    name: Deploy via SSH
    runs-on: ubuntu-latest
    needs: [docker]
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'

    steps:
      - uses: actions/checkout@v4

      - name: Deploy to server
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT || '22' }}
          envs: IMAGE_TAG,DB_PASSWORD,GHCR_TOKEN,GHCR_USER
          script: |
            cd /opt/payafrika

            echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GHCR_USER" --password-stdin

            docker compose pull
            IMAGE_TAG=$IMAGE_TAG DB_PASSWORD=$DB_PASSWORD docker compose up -d --remove-orphans
            docker image prune -f
        env:
          IMAGE_TAG: ${{ github.sha }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GHCR_USER: ${{ github.actor }}
